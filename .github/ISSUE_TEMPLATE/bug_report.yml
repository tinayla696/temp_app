
name: 🐞 Bug report
description: バグの報告（ブランチPrefixは bugfix/ を推奨）
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ありがとうございます。**ブランチ命名規則**: `bugfix/`（SemVer: Patch）
        例）`bugfix/fix-crash-on-startup`

  - type: textarea
    id: summary
    attributes:
      label: 概要 *
      description: 問題の簡潔な説明
      placeholder: 例）アプリ起動直後にクラッシュする
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順 *
      description: ステップごとに記載
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待結果 *
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の結果 *
      description: ログ/スクショ歓迎（機密情報注意）
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 影響バージョン/ビルド
      placeholder: v1.2.3 / build 456

  - type: dropdown
    id: semver
    attributes:
      label: SemVer影響（想定）
      options:
        - Patch（想定）
        - 不明
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 事前チェック
      options:
        - label: 既存Issueに同様の報告がないことを確認しました
          required: true
        - label: 最小再現（MRE）を可能な範囲で作成しました